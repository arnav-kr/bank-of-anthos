[loggers]
keys=root,gunicorn.error

[handlers]
keys=console

[formatters]
keys=json

[logger_root]
level=INFO
handlers=console

[logger_gunicorn.error]
level=INFO
handlers=console
qualname=gunicorn.error
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=json
args=(sys.stdout,)

[formatter_json]
format={"timestamp": "%(asctime)s", "message": "%(message)s", "severity": "%(levelname)s"}
datefmt=%Y-%m-%d %H:%M:%S
