    <header class="pt-3">
      <nav class="navbar navbar-expand-lg navbar-top px-3 py-3">
        <div class="container d-flex align-items-center justify-content-between">
          <a href="/" class="navbar-brand m-0 font-weight-bold">{{ bank_name }}</a>
          {% if name %}
            <button type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler navbar-toggler-right border-0">
              <span class="material-icons">menu</span>
            </button>
            <div class="justify-content-end collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav ml-auto align-items-center">
                <li class="nav-item dropdown">
                  <a class="nav-link dropdown-toggle" href="#" id="accountDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <span id="account-user-name">{{ name }}</span>
                  </a>
                  <div class="dropdown-menu dropdown-menu-right" aria-labelledby="accountDropdown">
                    <form id="logout-form" method="POST" action="/logout">
                      <a class="dropdown-item" onclick="document.querySelector('#logout-form').submit();">Sign out</a>
                    </form>
                  </div>
                </li>
              </ul>
            </div>
          {% endif %}
        </div>
      </nav>
    </header>
